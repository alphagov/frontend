      govspeak: |
        <h2 id="introduction">Introduction – by Sir Anthony Seldon</h2>

        <p>10 Downing Street, the locale of British prime ministers since 1735, vies with the White House as being the most important political building anywhere in the world in the modern era. Behind its black door have been taken the most important decisions affecting Britain for the last 275 years.</p>
        <p>In the 20th century alone, the First and Second World Wars were directed from within it, as were the key decisions about the end of the empire, the building of the British nuclear bomb, the handling of economic crises from the Great Depression in 1929 to the great recession, and the building up of the welfare state.</p>
        <h2 id="take-the-tour">Explore 10 Downing Street</h2>
        <p>Take a virtual tour inside 10 Downing Street and explore it’s most famous rooms and significant events at the <a href="https://www.google.com/culturalinstitute/beta/u/0/partner/10-downing-street" rel="external" class="govuk-link">Google Cultural Institute</a>.</p>

        <h2 id="origins-and-early-inhabitants">Origins and early inhabitants</h2>
        <p>The area around Downing Street was home to ancient Roman, Anglo-Saxon and Norman settlements, and was already a prestigious centre of government 1,000 years ago.</p>
        <p>The Romans first came to Britain under the command of Julius Caesar in 55 BC. Making their capital at Londinium downriver, the Romans chose Thorney Island – a marshy piece of land lying between two branches of the river Tyburn that flowed from Hampstead Heath to the Thames – as the site for their early settlement.</p>
